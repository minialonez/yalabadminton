<html lang="th">
<head>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Prompt',sans-serif;background:linear-gradient(160deg,#060e18,#0d1b2a 40%,#1b2838);color:#e8edf2;min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes scan{0%{top:10%}50%{top:85%}100%{top:10%}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes glow{0%,100%{box-shadow:0 0 8px #0ead82}50%{box-shadow:0 0 24px #0ead82}}
@keyframes spin{to{transform:rotate(360deg)}}
.nb{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:360px;pointer-events:none}
.nf{pointer-events:auto;padding:14px 18px;border-radius:14px;font-size:13px;font-weight:500;box-shadow:0 10px 40px rgba(0,0,0,.35);cursor:pointer;animation:slideIn .35s;line-height:1.5;color:#fff}
.ni{background:#1e3a5f}.ns{background:#0ead82}.nw{background:#ff6b35}.ne{background:#e63946}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;transition:opacity .8s}
.lw.out{opacity:0}
.lb{width:100%;max-width:400px;padding:48px 28px;text-align:center;animation:fadeUp .7s}
.li{font-size:64px;margin-bottom:8px;animation:float 3s ease-in-out infinite}
.lt{font-size:26px;font-weight:900;letter-spacing:2px;background:linear-gradient(90deg,#0ead82,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.fl{display:block;font-size:11px;color:#6a7a8a;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;text-align:left}
.fi{width:100%;padding:12px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#e8edf2;font-size:14px;font-family:'Prompt',sans-serif;outline:none}
.fi:focus{border-color:#0ead82}.fi::placeholder{color:#3a4a5a}
.b{width:100%;padding:13px;border-radius:14px;border:none;font-weight:700;font-size:15px;cursor:pointer;font-family:'Prompt',sans-serif;transition:transform .15s}
.b:active{transform:scale(.97)}.b:disabled{opacity:.4;cursor:not-allowed}
.bg{background:linear-gradient(135deg,#0ead82,#0d9070);color:#fff;box-shadow:0 4px 20px rgba(14,173,130,.3)}
.bo{background:#ff6b35;color:#fff}.br{background:linear-gradient(135deg,#e63946,#c1121f);color:#fff}
.bgr{background:linear-gradient(135deg,#0ead82,#ff6b35);color:#fff}
.bgh{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#8899aa;font-weight:600;font-size:13px}
.bp{background:rgba(123,104,238,.15);color:#7b68ee;border:1px solid rgba(123,104,238,.2)}
.hd{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(0,0,0,.25);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.ht{font-weight:900;font-size:16px;background:linear-gradient(90deg,#0ead82,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.od{width:8px;height:8px;border-radius:50%;background:#0ead82;box-shadow:0 0 10px #0ead82;display:inline-block}
.nv{display:flex;gap:2px;padding:6px 10px;background:rgba(0,0,0,.15);border-bottom:1px solid rgba(255,255,255,.04);overflow-x:auto}
.nv button{flex:1;min-width:48px;padding:8px 2px;border-radius:10px;border:none;background:transparent;color:#5a6a7a;font-weight:600;font-size:9px;cursor:pointer;font-family:'Prompt',sans-serif;text-align:center}

.nv button div{font-size:16px;margin-bottom:1px}
.mn{padding:16px 14px;max-width:640px;margin:0 auto}
.sc{animation:fadeUp .3s}
.sr{display:flex;gap:6px;margin-bottom:16px}
.sk{flex:1;padding:12px 8px;border-radius:14px;text-align:center}
.sn{font-size:24px;font-weight:900;font-family:'Orbitron',monospace}
.sl{font-size:9px;color:#6a7a8a;margin-top:3px;font-weight:500}
/* Dashboard player card */
.dpc{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.04);background:rgba(255,255,255,.02);margin-bottom:6px}
.dav{width:56px;height:56px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;overflow:hidden;border:3px solid rgba(255,255,255,.08)}
.dav img{width:100%;height:100%;object-fit:cover}
.dav.on{border-color:#0ead82;box-shadow:0 0 12px rgba(14,173,130,.3)}
.dav.play{border-color:#ff6b35;box-shadow:0 0 12px rgba(255,107,53,.3)}
.dav.off{opacity:.5}
.sb{font-size:9px;font-weight:700;padding:4px 10px;border-radius:20px}
.bd{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;background:rgba(255,255,255,.06);color:#d0d8e0;margin:0 3px 5px 0}
.cc{padding:18px;border-radius:16px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02)}
.cc.em{background:rgba(14,173,130,.04);border-color:rgba(14,173,130,.1)}
.tl{font-size:11px;color:#8899aa;text-align:center;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;margin-bottom:4px}
.tv{font-size:44px;font-weight:900;font-family:'Orbitron',monospace;letter-spacing:2px;text-align:center}
.tg{color:#0ead82}.tt{color:#ff6b35}.td{color:#e63946;animation:pulse .8s infinite}
.si{flex:1;text-align:center;font-size:20px;font-weight:800;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#e8edf2;font-family:'Prompt',sans-serif;outline:none}
.prc{padding:16px;border-radius:14px;margin-bottom:8px;border:1px solid rgba(14,173,130,.12);background:rgba(14,173,130,.04)}
.prc.open{animation:glow 2s infinite}
.dots{display:flex;gap:6px;margin:10px 0}
.dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden}
.dot.fl{background:linear-gradient(135deg,#0ead82,#1e3a5f)}
.dot.emp{background:rgba(255,255,255,.04);border:2px dashed rgba(255,255,255,.1);color:#3a4a5a;font-size:13px}
.dot img{width:100%;height:100%;object-fit:cover}
.ltag{font-size:8px;background:rgba(255,193,7,.15);color:#ffc107;padding:2px 6px;border-radius:6px;font-weight:700}
.qc{padding:14px;border-radius:14px;margin-bottom:8px;background:rgba(123,104,238,.06);border:1px solid rgba(123,104,238,.1)}
.hc{padding:14px;border-radius:14px;margin-bottom:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)}
.hg{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;font-size:11px}
.ep{text-align:center;padding:36px;color:#3a4a5a}
.lb2{font-size:11px;color:#5a6a7a;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.fw{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.tc{text-align:center}.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.cam-w{position:relative;width:220px;height:220px;border-radius:50%;overflow:hidden;border:4px solid #0ead82;margin:0 auto}
.cam-w video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.cam-w.sq{border-radius:18px;width:260px;height:260px}
.scanl{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#0ead82,transparent);box-shadow:0 0 20px #0ead82;animation:scan 2s ease-in-out infinite}
.loc-ok{padding:10px 14px;border-radius:12px;font-size:13px;font-weight:500;background:rgba(14,173,130,.1);color:#0ead82;border:1px solid rgba(14,173,130,.15);margin:10px 0}
.loc-err{padding:10px 14px;border-radius:12px;font-size:13px;font-weight:500;background:rgba(230,57,70,.1);color:#e63946;border:1px solid rgba(230,57,70,.15);margin:10px 0}
.reg-steps{display:flex;gap:3px;margin:12px 0}
.reg-step{flex:1;height:5px;border-radius:3px;background:rgba(255,255,255,.08)}
.reg-step.done{background:#0ead82}.reg-step.cur{background:#ff6b35;animation:pulse 1s infinite}
.reg-thumbs{display:flex;gap:6px;justify-content:center;margin:10px 0;flex-wrap:wrap}
.reg-thumb{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #0ead82}
.reg-thumb.emp2{border:2px dashed rgba(255,255,255,.1);background:rgba(255,255,255,.04)}
@keyframes flashCap{0%{opacity:1}100%{opacity:0}}
@keyframes countPop{0%{transform:scale(2);opacity:0}50%{transform:scale(1);opacity:1}100%{transform:scale(.8);opacity:0}}
.rec-dot{width:12px;height:12px;border-radius:50%;background:#e63946;animation:pulse .8s infinite;display:inline-block}
.cam-flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;border-radius:inherit}
.cam-flash.on{animation:flashCap .3s ease}
.count-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:72px;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(0,0,0,.7);font-family:'Orbitron',monospace;z-index:2}
.count-overlay span{animation:countPop .8s ease}
.pose-arrow{font-size:64px;animation:float 1.5s ease-in-out infinite}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:#0d1b2a;border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:24px;width:92%;max-width:400px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:800;margin-bottom:14px}
.avg{display:flex;flex-wrap:wrap;gap:5px}
.avo{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;background:rgba(255,255,255,.03);border:2px solid transparent}
.avo.on{background:rgba(14,173,130,.2);border-color:#0ead82}
.mr{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);margin-bottom:5px}
.abtn{display:flex;gap:3px}
.abtn button{padding:4px 8px;border-radius:6px;border:none;font-size:10px;font-weight:600;cursor:pointer;font-family:'Prompt',sans-serif}
.ack-btn{background:linear-gradient(135deg,#7b68ee,#6c5ce7);color:#fff;padding:12px;border-radius:12px;border:none;font-weight:700;font-size:14px;width:100%;cursor:pointer;font-family:'Prompt',sans-serif;animation:glow 1.5s infinite;margin-top:8px}
.loader{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.2);border-top-color:#0ead82;border-radius:50%;animation:spin .6s linear infinite}
@media(max-width:480px){.lt{font-size:22px}.tv{font-size:36px}.sn{font-size:22px}.cam-w{width:180px;height:180px}.cam-w.sq{width:220px;height:220px}.dav{width:50px;height:50px;font-size:22px}}
</style>
</head>
<body>
<div id="app"><div class="tc" style="padding:60px"><div class="loader" style="width:40px;height:40px;border-width:4px"></div><p style="color:#5a6a7a;margin-top:16px;font-size:13px">กำลังโหลด...</p></div></div>
<script>
// ════════════════════════════════════════════
// ⚠️ ใส่ URL ของ Apps Script ที่ Deploy แล้วตรงนี้
// ════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbyNdZGkptkmD_BsEQcIfYpcL9BlFrnGSJ0ufvY45G7ooMIDAXz42dTZKHNvkRLpWhVY3g/exec';
// ════════════════════════════════════════════

const CLAT=6.546966564532681,CLNG=101.2800595164241,MRAD=20;
const POSES=[{i:"😐",l:"หน้าตรง",s:"มองตรงกล้อง"},{i:"👈",l:"หันซ้าย",s:"หันหน้าไปทางซ้าย"},{i:"👉",l:"หันขวา",s:"หันหน้าไปทางขวา"},{i:"☝️",l:"เงยหน้า",s:"เงยหน้าขึ้นเล็กน้อย"},{i:"👇",l:"ก้มหน้า",s:"ก้มหน้าลงเล็กน้อย"},{i:"📸",l:"รูปโปรไฟล์",s:"ยิ้มสวยๆ! รูปนี้จะแสดงใน Dashboard"}];
const AVS=["🧑","👩","👨","👧","🧔","👩‍🦱","👦","👱‍♀️","🧑‍🦰","👩‍🦳","🧑‍🦱","👨‍🦰"];

let me=null,state=null,view="dashboard",loading=false,camStream=null;
let modal=null,editMem=null,nm={fn:"",ln:"",nn:"",un:"",pw:"1234",av:"🧑",role:"member",ms:"active"};
let scanPhase="idle",geoOk=null,geoDist=null,regStep=0,regPhotos=[];
let sam=false,pageMode="login"; // login | register | regSuccess

// ─── Notifications ───
let nc=0;const ns=[];
function notify(m,t="info"){const id=++nc;ns.push({id,msg:m,t});rn();setTimeout(()=>{ns.splice(ns.findIndex(n=>n.id===id),1);rn()},4500)}
function rn(){const el=document.querySelector("#nb");if(!el)return;el.innerHTML=ns.map(n=>`<div class="nf n${n.t==='success'?'s':n.t==='warn'?'w':n.t==='error'?'e':'i'}" onclick="ns.splice(ns.findIndex(x=>x.id===${n.id}),1);rn()">${n.msg}</div>`).join("")}

// ─── API ───
async function api(action,params={}){
  const url=API_URL+'?action='+action+'&'+new URLSearchParams(params);
  try{
    const r=await fetch(url,{redirect:'follow'});
    const t=await r.text();
    try{return JSON.parse(t)}catch(e){console.error('JSON parse error:',t.substring(0,200));return{ok:false,error:'Server ส่งข้อมูลผิดรูปแบบ'}}
  }catch(e){console.error('Fetch error:',e);return{ok:false,error:'เชื่อมต่อ server ไม่ได้ — '+e.message}}
}
async function apiPost(data){
  try{
    const r=await fetch(API_URL,{method:'POST',redirect:'follow',body:JSON.stringify(data)});
    const t=await r.text();
    try{return JSON.parse(t)}catch(e){console.error('JSON parse error:',t.substring(0,200));return{ok:false,error:'Server ส่งข้อมูลผิดรูปแบบ'}}
  }catch(e){console.error('Post error:',e);return{ok:false,error:'เชื่อมต่อ server ไม่ได้ — '+e.message}}
}
async function refreshState(){
  try{const r=await api('getState');if(r.ok)state=r;}catch(e){console.error(e)}
}

// ─── Camera ───
function stopCam(){if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null}}
async function startCam(sel){try{if(camStream&&camStream.active){setTimeout(()=>{const v=document.querySelector(sel);if(v){v.srcObject=camStream;v.play()}},50);return}stopCam();const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:"user",width:{ideal:480},height:{ideal:480}}});camStream=st;setTimeout(()=>{const v=document.querySelector(sel);if(v){v.srcObject=st;v.play()}},100)}catch(e){notify("❌ เปิดกล้องไม่ได้","error")}}
function capPhoto(sel){const v=document.querySelector(sel);if(!v||!v.videoWidth)return null;const c=document.createElement("canvas");c.width=300;c.height=300;const ctx=c.getContext("2d");const s=Math.min(v.videoWidth,v.videoHeight);const sx=(v.videoWidth-s)/2,sy=(v.videoHeight-s)/2;ctx.translate(300,0);ctx.scale(-1,1);ctx.drawImage(v,sx,sy,s,s,0,0,300,300);return c.toDataURL("image/jpeg",0.7)}

// ─── Geo ───
let myLat=0,myLng=0;
function checkGeo(cb){geoOk=null;geoDist=null;if(!navigator.geolocation){geoOk=false;cb(false);return}navigator.geolocation.getCurrentPosition(p=>{myLat=p.coords.latitude;myLng=p.coords.longitude;const d=haversine(myLat,myLng,CLAT,CLNG);geoDist=Math.round(d);geoOk=d<=MRAD;cb(geoOk)},()=>{geoOk=false;geoDist=-1;cb(false)},{enableHighAccuracy:true,timeout:10000})}
function haversine(a1,o1,a2,o2){const R=6371e3,d1=(a2-a1)*Math.PI/180,d2=(o2-o1)*Math.PI/180;const a=Math.sin(d1/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(d2/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}

// ─── Helpers ───
function fm(s){s=Math.abs(Math.round(s));const m=Math.floor(s/60),sc=s%60;return m+":"+String(sc).padStart(2,"0")}
function gm(id){return state?state.members.find(m=>m.id===id):null}
function avH(m){return m.facePhoto?`<img src="${m.facePhoto}">`:m.avatar}
function getMyP(){return state?state.parties.find(p=>p.members.some(m=>m.id===me.id)):null}
function elapsed(iso){return(Date.now()-new Date(iso).getTime())/1000}

// ─── Render ───
function R(){const a=document.querySelector("#app");if(!me){if(pageMode==="register")a.innerHTML=rReg();else if(pageMode==="regSuccess")a.innerHTML=rRegSuccess();else a.innerHTML=rl();return}
// Face registration mode (standalone)
if(scanPhase==="facereg"){a.innerHTML=wrapPage(renderFaceReg());rn();return}
// GPS check-in flow
if(scanPhase==="geo"||scanPhase==="geo_fail"||scanPhase==="camera"||scanPhase==="processing"){a.innerHTML=renderCIFlow();rn();return}
// Main app (everyone after login)
a.innerHTML=ra();rn()}

// ════ LOGIN ════
function rl(){const saved=localStorage.getItem("yb_user")||"";const savedP=localStorage.getItem("yb_pass")||"";const rem=localStorage.getItem("yb_remember")==="1";
return`<div class="lw" id="loginWrap"><div class="lb"><div class="li">🏸</div><h1 class="lt">YALA BADMINTON</h1><p style="color:#5a6a7a;font-size:12px;margin-bottom:32px;letter-spacing:1px">CLUB MANAGEMENT SYSTEM</p><div style="display:flex;flex-direction:column;gap:12px"><div style="text-align:left"><label class="fl">Username / Member ID</label><input class="fi" id="lu" value="${rem?saved:""}" placeholder="Username, Member ID, หรือชื่อเล่น" onkeydown="if(event.key==='Enter')document.querySelector('#lp').focus()" enterkeyhint="next"></div><div style="text-align:left"><label class="fl">Password</label><input class="fi" id="lp" type="password" value="${rem?savedP:""}" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter')doLogin()" enterkeyhint="go"></div><label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#6a7a8a;cursor:pointer"><input type="checkbox" id="lrem" ${rem?"checked":""}> จดจำการเข้าสู่ระบบ</label><div style="color:#e63946;font-size:12px;min-height:18px" id="le"></div><button class="b bg" onclick="doLogin()" id="lbtn" style="font-size:16px;padding:14px">เข้าสู่ระบบ</button><div style="text-align:center;margin-top:8px"><span style="font-size:13px;color:#6a7a8a">ยังไม่มีบัญชี? </span><button onclick="pageMode='register';nm={fn:'',ln:'',nn:'',un:'',pw:'',av:'🧑'};R()" style="background:none;border:none;color:#0ead82;font-weight:700;font-size:13px;cursor:pointer;font-family:'Prompt',sans-serif;text-decoration:underline">ลงทะเบียน</button></div></div></div></div>`}

// ─── Registration Page ───
function rReg(){return`<div class="lw"><div class="lb" style="animation:fadeUp .5s"><div style="font-size:48px;margin-bottom:8px">📝</div><h2 class="lt" style="font-size:22px;margin-bottom:4px">ลงทะเบียนสมาชิก</h2><p style="color:#5a6a7a;font-size:12px;margin-bottom:24px">สร้างบัญชีเพื่อเข้าใช้งาน Yala Badminton</p>
<div style="display:flex;flex-direction:column;gap:10px;text-align:left">

let regResult=null;
async function doRegister(){
  const fn=(document.querySelector("#rfn")||{}).value||"";
  const ln=(document.querySelector("#rln")||{}).value||"";
  const nn=(document.querySelector("#rnn")||{}).value||"";
  const un=(document.querySelector("#run")||{}).value||"";
  const pw=(document.querySelector("#rpw")||{}).value||"";
  const pw2=(document.querySelector("#rpw2")||{}).value||"";
  const errEl=document.querySelector("#re");
  const btn=document.querySelector("#rbtn");

  if(!fn.trim()||!nn.trim()||!un.trim()||!pw.trim()){if(errEl)errEl.textContent="กรุณากรอกช่องที่มี * ให้ครบ";return}
  if(pw!==pw2){if(errEl)errEl.textContent="รหัสผ่านไม่ตรงกัน";return}
  if(pw.length<4){if(errEl)errEl.textContent="รหัสผ่านต้องมีอย่างน้อย 4 ตัวอักษร";return}

  if(btn){btn.disabled=true;btn.innerHTML='<span class="loader"></span>'}
  try{
    const r=await apiPost({action:'selfRegister',firstName:fn.trim(),lastName:ln.trim(),nickname:nn.trim(),username:un.trim(),password:pw});
    if(r.ok){regResult={id:r.id,nn:r.nickname,un:un.trim(),pw:pw};pageMode="regSuccess";R()}
    else{if(errEl)errEl.textContent=r.error||"ลงทะเบียนไม่สำเร็จ";if(btn){btn.disabled=false;btn.textContent="📝 ลงทะเบียน"}}
  }catch(e){if(errEl)errEl.textContent="เชื่อมต่อ server ไม่ได้";if(btn){btn.disabled=false;btn.textContent="📝 ลงทะเบียน"}}
}

async function doLogin(){

${regCountdown>0?`<div class="count-overlay"><span key="${regCountdown}">${regCountdown}</span></div>`:""}
</div>

<div class="pose-arrow">${pose.i}</div>

${regCountdown>0?`<div style="font-size:14px;color:#ffc107;font-weight:700;margin-top:8px">📸 ถ่ายใน ${regCountdown} วินาที...</div>`:`<div style="font-size:13px;color:#0ead82;font-weight:600;margin-top:8px">✅ ถ่ายแล้ว!</div>`}
</div>

function startRecording(){regRecording=true;regStep=0;regCountdown=3;R();
// Re-attach camera after render
setTimeout(()=>{const v=document.querySelector("#reg-vid");if(v&&camStream){v.srcObject=camStream;v.play()}runPoseCountdown()},150)}

function runPoseCountdown(){
if(regTimer)clearInterval(regTimer);
regCountdown=3;R();reattachCam();
regTimer=setInterval(()=>{
regCountdown--;
if(regCountdown<=0){
clearInterval(regTimer);regTimer=null;
// Auto-capture!
autoCaptureReg();
}else{R();reattachCam()}
},1000)}

function reattachCam(){setTimeout(()=>{const v=document.querySelector("#reg-vid");if(v&&camStream&&!v.srcObject){v.srcObject=camStream;v.play()}},50)}

function autoCaptureReg(){
// Flash effect
const flash=document.querySelector("#reg-flash");if(flash)flash.classList.add("on");
// Capture photo
const photo=capPhoto("#reg-vid");
if(photo)regPhotos.push(photo);else regPhotos.push("");
// Show captured state briefly then advance
R();reattachCam();
setTimeout(()=>{
if(regStep>=5){// All done!
stopCam();regRecording=false;
if(regPhotos[5]){// Save profile photo (last one)
finishFaceReg(regPhotos[5]);
}else if(regPhotos.length>0){// Use any available photo
const profilePhoto=regPhotos.find(p=>p)||regPhotos[0];
finishFaceReg(profilePhoto);
}
}else{
regStep++;
runPoseCountdown();
}
},1200)}

async function finishFaceReg(profilePhoto){
try{
await apiPost({action:'registerFace',id:me.id,photo:profilePhoto});
me.facePhoto=profilePhoto;
notify("✅ ลงทะเบียนใบหน้าสำเร็จ! กลับไปหน้าเช็คอิน","success");
}catch(e){notify("❌ บันทึกไม่สำเร็จ","error")}
// กลับไปหน้าเช็คอิน (idle)
scanPhase="idle";regStep=-1;regPhotos=[];regRecording=false;R()
}

function cancelReg(){if(regTimer){clearInterval(regTimer);regTimer=null}stopCam();scanPhase="idle";regStep=-1;regPhotos=[];regRecording=false;R()}

const stx=inCourt?"กำลังเล่น":inParty?"ใน Party":on?"ออนไลน์":"ออฟไลน์";
const stc=inCourt?"#ff6b35":inParty?"#7b68ee":on?"#0ead82":"#4a5a6a";
const avcls=inCourt?"play":on?"on":"off";

// ════ PARTIES ════
function rpa(){const myP=getMyP();const openP=state.parties.filter(p=>p.members.length<4);const canC=!myP&&me.isOnline;
let myPh="";if(myP){const isl=myP.leaderId===me.id;myPh=`<div style="margin-bottom:14px"><div class="lb2">Party ของคุณ</div><div class="prc"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-weight:800;font-size:13px">${isl?"👑 หัวหน้า":"🏸 Party"}</span><span style="font-size:11px;color:#6a7a8a">${myP.members.length}/4</span></div><div class="dots">${myP.members.map(m=>{const mm=gm(m.id);return`<div class="dot fl">${mm?avH(mm):m.nn[0]}</div>`}).join("")}${Array.from({length:4-myP.members.length}).map(()=>'<div class="dot emp">?</div>').join("")}</div><div class="fw">${myP.members.map(m=>`<span class="bd">${(gm(m.id)||{}).avatar||"?"} ${m.nn}${m.id===myP.leaderId?' <span class="ltag">หัวหน้า</span>':""}</span>`).join("")}</div>
${myP.members.length===4&&myP.status==="full"&&isl?`<button class="ack-btn" onclick="doAck('${myP.id}')">✅ รับทราบ — พาทีมเข้าคอร์ด</button>`:""}
${myP.status==="ready"&&!myP.courtId?`<div class="tc" style="padding:8px;color:#7b68ee;font-size:12px;font-weight:600">📋 รอเข้าคอร์ด...</div>`:""}
${myP.members.length<4?`<div style="font-size:11px;color:#6a7a8a;margin-top:4px">รอเพิ่มอีก ${4-myP.members.length} คน</div>`:""}
${isl&&!myP.courtId?`<button class="b br mt8" onclick="doDisband('${myP.id}')" style="font-size:11px;padding:8px">ยุบ Party</button>`:!isl&&!myP.courtId?`<button class="b bgh mt8" onclick="doLeave('${myP.id}')" style="font-size:11px;padding:8px">ออกจาก Party</button>`:""}</div></div>`}
return`<h3 style="font-size:16px;font-weight:800;margin-bottom:12px">🎯 จัดการ Party</h3>${canC?`<button class="b bg" onclick="doCreateParty()" style="font-size:14px;padding:12px;margin-bottom:12px">🎯 สร้าง Party ใหม่ (คุณเป็นหัวหน้า)</button>`:""}${myPh}${openP.length>0?`<div class="lb2 mt12">Party ที่เปิดรับ</div>${openP.filter(p=>!myP||p.id!==myP.id).map(p=>{const cj=!myP&&me.isOnline;return`<div class="prc${cj?" open":""}"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-weight:700;font-size:12px">Party</span><span style="font-size:11px;color:#6a7a8a">${p.members.length}/4</span></div><div class="fw">${p.members.map(m=>`<span class="bd">${(gm(m.id)||{}).avatar||"?"} ${m.nn}${m.id===p.leaderId?" 👑":""}</span>`).join("")}</div>${cj?`<button class="b bp" onclick="doJoin('${p.id}')" style="font-size:12px;padding:8px">🤝 เข้าร่วม</button>`:""}</div>`}).join("")}`:`${!myP?'<div class="ep"><div style="font-size:36px;opacity:.3">🎯</div><div style="font-size:13px">ยังไม่มี Party</div></div>':""}`}`}

async function doCreateParty(){loading=true;try{const r=await apiPost({action:'createParty',leaderId:me.id,leaderName:me.nickname});if(r.ok)notify("🎯 สร้าง Party แล้ว!","success");else notify("❌ "+r.error,"error");await refreshState();R()}catch(e){notify("❌ ไม่สำเร็จ","error")}loading=false}
async function doJoin(pid){try{const r=await apiPost({action:'joinParty',partyId:pid,memberId:me.id,memberName:me.nickname});if(r.ok){notify("🤝 เข้าร่วม Party! ("+r.count+"/4)","success");if(r.count===4)notify("🔔 ครบ 4 คนแล้ว!","success")}else notify("❌ "+r.error,"error");await refreshState();R()}catch(e){notify("❌ ไม่สำเร็จ","error")}}
async function doLeave(pid){try{await apiPost({action:'leaveParty',partyId:pid,memberId:me.id});notify("👋 ออกจาก Party","warn");await refreshState();R()}catch(e){notify("❌","error")}}
async function doDisband(pid){if(!confirm("ยุบ Party?"))return;try{await apiPost({action:'disbandParty',partyId:pid});notify("🗑 ยุบ Party","warn");await refreshState();R()}catch(e){notify("❌","error")}}
async function doAck(pid){try{await apiPost({action:'ackParty',partyId:pid});notify("✅ รับทราบแล้ว!","success");await refreshState();R()}catch(e){notify("❌","error")}}

// ════ COURTS ════
function rco(){const myP=getMyP();const readyP=myP&&myP.status==="ready"&&!myP.courtId;const inQueue=myP&&state.queue.some(q=>q.partyId===myP.id);
return state.courts.map(c=>{
if(!c.partyId){let enterBtn="";
if(readyP&&!inQueue)enterBtn=`<button class="b bg mt8" onclick="doEnter(${c.id},'${myP.id}')" style="font-size:13px;padding:10px">🏸 เข้า ${c.name}</button>`;
return`<div class="cc em"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-weight:800;font-size:15px">${c.name}</div><div class="sb" style="background:rgba(14,173,130,.12);color:#0ead82">ว่าง</div></div><div class="tc" style="padding:12px"><div style="font-size:28px;opacity:.3">🏸</div><div style="color:#5a6a7a;font-size:12px;margin-top:4px">พร้อมใช้งาน</div>${enterBtn}</div></div>`}
const party=state.parties.find(p=>p.id===c.partyId);if(!party)return"";
const isl=me.id===party.leaderId;const bds=party.members.map(m=>`<span class="bd">${(gm(m.id)||{}).avatar||"?"} ${m.nn}${m.id===party.leaderId?" 👑":""}</span>`).join("");
let phLbl,phClr;switch(c.phase){case"pre_warmup":phLbl="⏳ รอ Warmup";phClr="#ffc107";break;case"warmup":phLbl="🔥 Warmup";phClr="#ff6b35";break;case"pre_start":phLbl="⏳ รอเริ่ม";phClr="#ffc107";break;case"set1":phLbl="🏸 SET 1";phClr="#ff6b35";break;case"rest":phLbl="😮‍💨 พัก";phClr="#7b68ee";break;case"rest_grace":phLbl="⚠️ ต้องเริ่ม!";phClr="#e63946";break;case"set2":phLbl="🏸 SET 2";phClr="#ff6b35";break;case"done":phLbl="✅ จบ";phClr="#0ead82";break;default:phLbl="";phClr="#999"}
const el=c.phaseStart?elapsed(c.phaseStart):0;let bd="";
if(c.phase==="pre_warmup")bd=`<div class="tc">${isl?`<p style="font-size:12px;color:#ffc107;margin:10px 0">ทุกคนพร้อมแล้ว?</p><button class="b bo" onclick="doStartWU(${c.id})">🔥 เริ่ม Warmup</button>`:`<p style="font-size:12px;color:#6a7a8a;margin:8px 0">รอหัวหน้า...</p>`}</div>`;
else if(c.phase==="warmup"){const rem=Math.max(0,300-el);const tc2=rem<60?"td":rem<120?"tt":"tg";bd=`<div class="tc"><div class="tl">🔥 Warmup</div><div class="tv ${tc2}">${fm(rem)}</div></div>`}
else if(c.phase==="pre_start"){const rem=Math.max(0,300-el);const tc2=rem<60?"td":rem<120?"tt":"tg";bd=`<div class="tc"><div class="tl">กดเริ่มภายใน</div><div class="tv ${tc2}">${fm(rem)}</div>${isl?`<button class="b bg mt12" onclick="doStartSet(${c.id},1)">▶ เริ่ม Set 1</button>`:""}</div>`}
else if(c.phase==="set1"||c.phase==="set2"){const sn=c.phase==="set1"?"1":"2";bd=`<div><div class="tl">🏸 Set ${sn}</div><div class="tv tg">${fm(el)}</div>${c.phase==="set2"&&c.scoreSet1?`<div class="tc" style="font-size:11px;color:#5a6a7a;margin-top:3px">Set 1: <b style="color:#0ead82">${c.scoreSet1}</b></div>`:""}${isl?`<div style="display:flex;gap:6px;margin-top:10px;align-items:center"><div style="flex:1"><div style="font-size:9px;color:#5a6a7a;font-weight:600;margin-bottom:3px">ทีม A</div><input class="si" id="sa${c.id}" type="number" placeholder="0" enterkeyhint="next"></div><div style="font-weight:900;color:#3a4a5a;font-size:18px;padding-top:10px">:</div><div style="flex:1"><div style="font-size:9px;color:#5a6a7a;font-weight:600;margin-bottom:3px">ทีม B</div><input class="si" id="sb${c.id}" type="number" placeholder="0" enterkeyhint="done" onkeydown="if(event.key==='Enter')doEndSet(${c.id})"></div></div><button class="b ${c.phase==='set1'?'bo':'br'} mt8" onclick="doEndSet(${c.id})">${c.phase==="set1"?"📝 จบ Set 1":"🏆 จบ Set 2"}</button>`:""}</div>`}
else if(c.phase==="rest"){const rem=Math.max(0,900-el);const tc2=rem<60?"td":rem<120?"tt":"tg";bd=`<div class="tc"><div class="tl">😮‍💨 พัก</div><div class="tv ${tc2}">${fm(rem)}</div><div style="font-size:12px;margin:4px 0">Set 1: <b style="color:#0ead82">${c.scoreSet1}</b></div>${rem<=0&&isl?`<button class="b bg mt8" onclick="doStartSet(${c.id},2)">▶ เริ่ม Set 2</button>`:""}</div>`}
else if(c.phase==="rest_grace"){const rem=Math.max(0,300-el);bd=`<div class="tc"><div class="tl">⚠️ กดเริ่มภายใน</div><div class="tv td">${fm(rem)}</div>${isl?`<button class="b bg mt8" onclick="doStartSet(${c.id},2)">▶ เริ่ม Set 2</button>`:""}</div>`}
else if(c.phase==="done"){bd=`<div class="tc"><div style="font-size:36px;margin-bottom:4px">🏆</div><div class="g2" style="margin-bottom:10px;background:rgba(255,255,255,.03);border-radius:12px;padding:12px"><div><div style="font-size:9px;color:#5a6a7a;font-weight:600">SET 1</div><div style="font-weight:900;font-size:20px;color:#0ead82;font-family:'Orbitron',monospace">${c.scoreSet1}</div><div style="font-size:10px;color:#6a7a8a">⏱ ${fm(c.timeSet1)}</div></div><div><div style="font-size:9px;color:#5a6a7a;font-weight:600">SET 2</div><div style="font-weight:900;font-size:20px;color:#ff6b35;font-family:'Orbitron',monospace">${c.scoreSet2}</div><div style="font-size:10px;color:#6a7a8a">⏱ ${fm(c.timeSet2)}</div></div></div><div style="padding:8px 12px;border-radius:10px;background:rgba(255,255,255,.03);margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;color:#6a7a8a"><span>พัก</span><span style="color:#7b68ee;font-weight:700">${fm(c.timeRest)}</span></div><div style="display:flex;justify-content:space-between;font-size:13px;font-weight:800;margin-top:2px"><span>รวม</span><span style="color:#0ead82;font-family:'Orbitron',monospace">${fm((parseInt(c.timeSet1)||0)+(parseInt(c.timeSet2)||0)+(parseInt(c.timeRest)||0))}</span></div></div>${isl?`<button class="b bgh" onclick="doClear(${c.id})" style="width:auto;padding:8px 24px;font-size:11px">เคลียร์คอร์ด</button>`:""}</div>`}
return`<div class="cc"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-weight:800;font-size:15px">${c.name}</div><div class="sb" style="color:${phClr};background:rgba(${phClr==="#0ead82"?"14,173,130":phClr==="#ff6b35"?"255,107,53":phClr==="#7b68ee"?"123,104,238":phClr==="#ffc107"?"255,193,7":phClr==="#e63946"?"230,57,70":"100,100,100"},.12)">${phLbl}</div></div><div class="fw">${bds}</div>${bd}</div>`}).join("")+
(readyP&&state.courts.every(c=>c.partyId)&&!inQueue?`<div class="tc" style="padding:14px"><button class="b bp" onclick="doQueue('${myP.id}')" style="font-size:14px;padding:12px">📋 คอร์ดเต็ม — จองคิว</button></div>`:"")}

async function doEnter(cid,pid){try{const r=await apiPost({action:'enterCourt',courtId:cid,partyId:pid});if(r.ok)notify("🏸 เข้า Court แล้ว!","success");else notify("❌ "+r.error,"error");await refreshState();R()}catch(e){notify("❌","error")}}
async function doQueue(pid){try{const r=await apiPost({action:'queueParty',partyId:pid});if(r.ok)notify("📋 จองคิวที่ "+r.position,"success");else notify("❌ "+r.error,"error");await refreshState();R()}catch(e){notify("❌","error")}}
async function doStartWU(cid){try{await apiPost({action:'startWarmup',courtId:cid});notify("🔥 เริ่ม Warmup!","success");await refreshState();R()}catch(e){notify("❌","error")}}
async function doStartSet(cid,sn){try{await apiPost({action:'startSet',courtId:cid,set:sn});notify("🏸 เริ่ม Set "+sn+"!","success");await refreshState();R()}catch(e){notify("❌","error")}}
async function doEndSet(cid){const a=(document.querySelector("#sa"+cid)||{}).value||"0";const b=(document.querySelector("#sb"+cid)||{}).value||"0";try{const r=await apiPost({action:'endSet',courtId:cid,scoreA:a,scoreB:b});if(r.ok)notify("📝 บันทึกสำเร็จ!","success");else notify("❌ "+r.error,"error");await refreshState();R()}catch(e){notify("❌","error")}}
async function doClear(cid){try{const r=await apiPost({action:'clearCourt',courtId:cid});if(r.ok){notify("✅ เคลียร์คอร์ดแล้ว","success");if(r.nextParty)notify("🏸 คิวถัดไปเข้าคอร์ด!","success")}await refreshState();R()}catch(e){notify("❌","error")}}

// ════ QUEUE ════
function rq(){return`<h3 style="font-size:16px;font-weight:800;margin-bottom:12px">📋 คิว (${state.queue.length})</h3>`+(state.queue.length===0?'<div class="ep"><div style="font-size:36px;opacity:.3">📋</div><div style="font-size:13px">ว่าง</div></div>':state.queue.map((q,i)=>{const p=state.parties.find(x=>x.id===q.partyId);if(!p)return"";return`<div class="qc"><div style="font-weight:800;font-size:13px;color:#7b68ee;margin-bottom:6px">ลำดับที่ ${i+1}</div><div class="fw" style="margin-bottom:0">${p.members.map(m=>`<span class="bd">${(gm(m.id)||{}).avatar||"?"} ${m.nn}${m.id===p.leaderId?" 👑":""}</span>`).join("")}</div></div>`}).join(""))}

// ════ HISTORY ════
function rh(){return`<h3 style="font-size:16px;font-weight:800;margin-bottom:12px">📜 ประวัติ (${state.history.length})</h3>`+(state.history.length===0?'<div class="ep"><div style="font-size:36px;opacity:.3">📜</div><div style="font-size:13px">ยังไม่มี</div></div>':state.history.map(h=>`<div class="hc"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-weight:700;font-size:12px;color:#0ead82">${h.court}</span><span style="font-size:10px;color:#5a6a7a">${h.date}</span></div><div class="fw" style="margin-bottom:6px">${h.players.map(p=>`<span style="padding:2px 6px;border-radius:10px;font-size:10px;background:rgba(255,255,255,.05);color:#b0b8c0">${p.nn}</span>`).join("")}</div><div class="hg"><div class="tc"><div style="color:#5a6a7a;font-size:8px;font-weight:600">SET 1</div><div style="font-weight:800;color:#0ead82;font-size:12px">${h.scoreSet1}</div></div><div class="tc"><div style="color:#5a6a7a;font-size:8px;font-weight:600">SET 2</div><div style="font-weight:800;color:#ff6b35;font-size:12px">${h.scoreSet2}</div></div><div class="tc"><div style="color:#5a6a7a;font-size:8px;font-weight:600">พัก</div><div style="font-weight:700;color:#7b68ee;font-size:12px">${fm(h.timeRest)}</div></div><div class="tc"><div style="color:#5a6a7a;font-size:8px;font-weight:600">รวม</div><div style="font-weight:800;font-size:12px">${fm(h.timeTotal)}</div></div></div></div>`).join(""))}

// ════ SETTINGS ════
function rset(){return`<div style="animation:fadeUp .3s"><h3 style="font-size:16px;font-weight:800;margin-bottom:14px">⚙️ ตั้งค่าบัญชี</h3>

<div style="padding:18px;border-radius:14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06)">
<div style="font-size:12px;font-weight:700;color:#0ead82;margin-bottom:12px">🔑 ข้อมูลเข้าสู่ระบบ</div>
<div style="margin-bottom:10px"><label class="fl">Username</label><input class="fi" id="su" value="${me.username||""}" placeholder="กำหนด Username" enterkeyhint="next"></div>
<div style="margin-bottom:10px"><label class="fl">รหัสผ่านปัจจุบัน</label><input class="fi" id="sop" type="password" enterkeyhint="next"></div>
<div style="margin-bottom:10px"><label class="fl">รหัสผ่านใหม่</label><input class="fi" id="snp" type="password" enterkeyhint="next"></div>
<div style="margin-bottom:10px"><label class="fl">ยืนยันรหัสผ่านใหม่</label><input class="fi" id="scp" type="password" enterkeyhint="done" onkeydown="if(event.key==='Enter')doSaveProfile()"></div>
<div id="serr" style="color:#e63946;font-size:11px;min-height:16px;margin:6px 0"></div>
<button class="b bg" onclick="doSaveProfile()" style="font-size:13px;padding:11px">💾 บันทึก</button>
</div>
${me.facePhoto?`<div style="margin-top:14px;padding:14px;border-radius:14px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06)"><div style="font-size:12px;font-weight:700;color:#7b68ee;margin-bottom:8px">📷 ข้อมูลใบหน้า</div><div style="display:flex;align-items:center;gap:10px"><img src="${me.facePhoto}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid #0ead82"><span style="font-size:12px;color:#0ead82">ลงทะเบียนแล้ว ✅</span></div></div>`:""}</div>`}

async function doSaveProfile(){const un=(document.querySelector("#su")||{}).value||"";const op=(document.querySelector("#sop")||{}).value||"";const np=(document.querySelector("#snp")||{}).value||"";const cp=(document.querySelector("#scp")||{}).value||"";
const data={action:'updateProfile',id:me.id};if(un)data.username=un;if(np){if(np!==cp){document.querySelector("#serr").textContent="รหัสผ่านใหม่ไม่ตรงกัน";return}if(np.length<4){document.querySelector("#serr").textContent="ขั้นต่ำ 4 ตัวอักษร";return}data.oldPassword=op;data.newPassword=np}
try{const r=await apiPost(data);if(r.ok){notify("✅ บันทึกสำเร็จ!","success");if(un)me.username=un}else{document.querySelector("#serr").textContent=r.error}}catch(e){notify("❌","error")}}

// ════ MEMBERS (Admin) ════
function rm(){if(me.role!=="admin")return"";let f="";
if(sam){const nid="YB-"+String(state.members.length+1).padStart(3,"0");f=`<div style="padding:16px;border-radius:14px;background:rgba(14,173,130,.05);border:1px solid rgba(14,173,130,.1);margin-bottom:14px;animation:fadeUp .3s"><div style="font-size:12px;font-weight:700;color:#0ead82;margin-bottom:10px">➕ เพิ่มสมาชิก (${nid})</div><div style="display:flex;flex-direction:column;gap:8px"><div class="g2"><div><label class="fl">ชื่อจริง *</label><input class="fi" id="nfn" oninput="nm.fn=this.value" style="padding:10px 12px" enterkeyhint="next"></div><div><label class="fl">นามสกุล</label><input class="fi" id="nln" oninput="nm.ln=this.value" style="padding:10px 12px" enterkeyhint="next"></div></div><div><label class="fl">ชื่อเล่น *</label><input class="fi" id="nnn" oninput="nm.nn=this.value" style="padding:10px 12px" enterkeyhint="next"></div><div class="g2"><div><label class="fl">Username *</label><input class="fi" id="nun" oninput="nm.un=this.value" style="padding:10px 12px" enterkeyhint="next"></div><div><label class="fl">Password</label><input class="fi" id="npw" value="1234" oninput="nm.pw=this.value" style="padding:10px 12px" enterkeyhint="done"></div></div><div><label class="fl">สิทธิ์</label><div style="display:flex;gap:5px"><button class="b" style="flex:1;padding:7px;font-size:11px;${nm.role==='admin'?'background:rgba(255,193,7,.15);color:#ffc107':'background:rgba(255,255,255,.03);color:#5a6a7a'}" onclick="nm.role='admin';R()">👑 แอดมิน</button><button class="b" style="flex:1;padding:7px;font-size:11px;${nm.role==='member'?'background:rgba(14,173,130,.15);color:#0ead82':'background:rgba(255,255,255,.03);color:#5a6a7a'}" onclick="nm.role='member';R()">🏸 สมาชิก</button></div></div><button class="b bg mt8" onclick="doAddMem()" style="font-size:12px;padding:10px">✅ เพิ่ม</button></div></div>`}
return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="font-size:16px;font-weight:800">👥 สมาชิก (${state.members.length})</h3><button class="b ${sam?'br':'bg'}" style="width:auto;padding:6px 12px;font-size:11px" onclick="sam=!sam;nm={fn:'',ln:'',nn:'',un:'',pw:'1234',av:'🧑',role:'member',ms:'active'};R()">${sam?"✕":"+ เพิ่ม"}</button></div>${f}${state.members.map((m,i)=>`<div class="mr"><div style="font-size:9px;color:#4a5a6a;font-weight:700;width:18px">${i+1}</div><div class="dav ${m.isOnline?"on":"off"}" style="width:38px;height:38px;font-size:18px">${avH(m)}</div><div style="flex:1"><div style="font-weight:700;font-size:12px">${m.nickname} ${m.role==="admin"?'<span class="ltag">👑</span>':""} ${m.facePhoto?'<span style="font-size:8px;color:#0ead82">📷</span>':""}</div><div style="font-size:9px;color:#6a7a8a">${m.firstName} ${m.lastName} · ${m.id}${m.username?" · @"+m.username:""}</div></div><div class="abtn"><button style="background:rgba(123,104,238,.12);color:#7b68ee" onclick="openEdit('${m.id}')">✏️</button><button style="background:rgba(230,57,70,.12);color:#e63946" onclick="doDelMem('${m.id}')">🗑</button></div></div>`).join("")}`}

async function doAddMem(){try{const r=await apiPost({action:'addMember',username:nm.un,password:nm.pw||"1234",firstName:nm.fn,lastName:nm.ln,nickname:nm.nn,avatar:nm.av,role:nm.role});if(r.ok){notify("✅ เพิ่ม "+nm.nn+" ("+r.id+")","success");sam=false}else notify("❌ "+r.error,"error");await refreshState();R()}catch(e){notify("❌","error")}}
async function doDelMem(id){if(!confirm("ลบสมาชิกนี้?"))return;try{await apiPost({action:'deleteMember',id});notify("🗑 ลบแล้ว","warn");await refreshState();R()}catch(e){notify("❌","error")}}

function openEdit(id){modal="edit";editMem=gm(id);nm={fn:editMem.firstName,ln:editMem.lastName,nn:editMem.nickname,un:editMem.username||"",pw:"",av:editMem.avatar,role:editMem.role,ms:editMem.memberStatus};R()}
function renderModal(){if(modal==="edit"&&editMem){return`<div class="modal-bg" onclick="modal=null;R()"><div class="modal" onclick="event.stopPropagation()"><h3>✏️ แก้ไข ${editMem.nickname}</h3><div style="display:flex;flex-direction:column;gap:8px"><div class="g2"><div><label class="fl">ชื่อจริง</label><input class="fi" value="${nm.fn}" oninput="nm.fn=this.value"></div><div><label class="fl">นามสกุล</label><input class="fi" value="${nm.ln}" oninput="nm.ln=this.value"></div></div><div><label class="fl">ชื่อเล่น</label><input class="fi" value="${nm.nn}" oninput="nm.nn=this.value"></div><div class="g2"><div><label class="fl">Username</label><input class="fi" value="${nm.un}" oninput="nm.un=this.value"></div><div><label class="fl">Password ใหม่</label><input class="fi" value="${nm.pw}" oninput="nm.pw=this.value" placeholder="ไม่เปลี่ยนปล่อยว่าง"></div></div><div><label class="fl">สิทธิ์</label><div style="display:flex;gap:5px"><button class="b" style="flex:1;padding:7px;font-size:11px;${nm.role==='admin'?'background:rgba(255,193,7,.15);color:#ffc107':'background:rgba(255,255,255,.03);color:#5a6a7a'}" onclick="nm.role='admin';R()">👑</button><button class="b" style="flex:1;padding:7px;font-size:11px;${nm.role==='member'?'background:rgba(14,173,130,.15);color:#0ead82':'background:rgba(255,255,255,.03);color:#5a6a7a'}" onclick="nm.role='member';R()">🏸</button></div></div><button class="b bg" onclick="doSaveEdit()">💾 บันทึก</button><button class="b bgh mt8" onclick="modal=null;R()">ยกเลิก</button></div></div></div>`}return""}
async function doSaveEdit(){const data={action:'editMember',id:editMem.id,firstName:nm.fn,lastName:nm.ln,nickname:nm.nn,username:nm.un,avatar:nm.av,role:nm.role,memberStatus:nm.ms};if(nm.pw)data.password=nm.pw;try{const r=await apiPost(data);if(r.ok)notify("✅ แก้ไขแล้ว","success");else notify("❌ "+r.error,"error");modal=null;await refreshState();R()}catch(e){notify("❌","error")}}

// ════ SMART POLLING — refresh ทุก 30 วิ + หลังทำ action ════
let lastRefresh=0;
async function smartRefresh(){
  if(!me||scanPhase!=="idle")return;
  const now2=Date.now();
  if(now2-lastRefresh<3000)return;
  lastRefresh=now2;
  try{await refreshState();R()}catch(e){}
}
setInterval(smartRefresh,30000);

// ════ INIT ════
(async()=>{
  // Check API URL
  if(!API_URL||API_URL==='YOUR_APPS_SCRIPT_URL_HERE'){
    document.querySelector("#app").innerHTML='<div style="text-align:center;padding:40px"><div style="font-size:48px;margin-bottom:12px">⚠️</div><h2 style="font-weight:800;font-size:18px;color:#e63946;margin-bottom:8px">ยังไม่ได้ตั้งค่า API URL</h2><p style="color:#6a7a8a;font-size:13px;line-height:1.7">เปิดไฟล์ index.html แล้วแก้บรรทัด:<br><code style="background:rgba(255,255,255,.1);padding:4px 8px;border-radius:6px;font-size:12px">const API_URL = \'YOUR_APPS_SCRIPT_URL_HERE\';</code><br><br>เปลี่ยนเป็น URL ที่ได้จาก Apps Script Deploy</p></div>';
    return;
  }
  // Try auto-login (fast path)
  const rem=localStorage.getItem("yb_remember")==="1";
  if(rem&&localStorage.getItem("yb_user")){
    try{
      const r=await api('login',{user:localStorage.getItem("yb_user"),pass:localStorage.getItem("yb_pass")});
      if(r.ok){localStorage.setItem("yb_token",r.token);me=r.member;R();refreshState().then(()=>R());return}
    }catch(e){console.error('Auto-login failed:',e)}
  }
  R();
})();
</script>
